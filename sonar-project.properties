sonar.projectKey=khajdari_WhoopsPay
sonar.organization=khajdari
sonar.host.url=https://sonarcloud.io

# Source code configuration
sonar.sources=client/src,server,shared
sonar.tests=client/src,server,security-tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.test.js,**/security-tests/**

# Exclusions for build artifacts and dependencies only
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js

# Coverage configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.*,**/test/**

# Security and quality settings
sonar.security.hotspots.enabled=true
sonar.qualitygate.wait=true

# FULL SECURITY SCANNING - NO EXCLUSIONS
# Detect all OWASP Top 10 and API Security vulnerabilities
sonar.java.binaries=.
sonar.security.review.enabled=true

# Force full analysis in pull requests (not just new code)
sonar.pullrequest.vcs.parameter=false
sonar.analysis.mode=publish