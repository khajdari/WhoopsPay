sonar.projectKey=khajdari_WhoopsPay
sonar.organization=khajdari
sonar.host.url=https://sonarcloud.io

# Source code configuration
sonar.sources=client/src,server,shared
sonar.tests=client/src,server
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.test.js

# Exclusions for build artifacts and dependencies
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js

# Coverage configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.*,**/test/**

# Security and quality settings
sonar.security.hotspots.enabled=true
sonar.qualitygate.wait=true

# Educational vulnerability exclusions
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=*:S*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*educational*/**
sonar.issue.ignore.multicriteria.e2.ruleKey=*:S*
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*vulnerable*/**
sonar.issue.ignore.multicriteria.e3.ruleKey=*:S*
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*demo*/**