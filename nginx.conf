events {
    worker_connections 1024;
}

http {
    upstream whoopspay_backend {
        server whoopspay:5000;
    }

    upstream juice_shop_backend {
        server juice-shop:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=payment:10m rate=5r/s;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # WhoopsPay main application
    server {
        listen 80;
        server_name localhost whoopspay.local;

        # Security settings
        client_max_body_size 10M;
        
        # WhoopsPay application
        location / {
            proxy_pass http://whoopspay_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # API endpoints with rate limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://whoopspay_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment endpoints with stricter rate limiting
        location /api/juice-shop/payment-request {
            limit_req zone=payment burst=5 nodelay;
            proxy_pass http://whoopspay_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Juice Shop application
    server {
        listen 80;
        server_name juice-shop.local juice.local;

        # Juice Shop application
        location / {
            proxy_pass http://juice_shop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # Juice Shop API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://juice_shop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Juice Shop REST API
        location /rest/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://juice_shop_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Health check endpoint
    server {
        listen 80;
        server_name health.local;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /whoopspay/health {
            proxy_pass http://whoopspay_backend/api/health;
        }

        location /juice-shop/health {
            proxy_pass http://juice_shop_backend/rest/admin/application-version;
        }
    }
}