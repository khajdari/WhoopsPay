version: '3.8'

services:
  # WhoopsPay Application
  whoopspay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whoopspay-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=127.0.0.1
      - DATABASE_URL=file:./server/database.db
      - SESSION_SECRET=your-session-secret-key-change-in-production
      # Integration settings
      - JUICE_SHOP_URL=http://juice-shop:3000
      - WHOOPSPAY_URL=http://whoopspay:5000
    volumes:
      - whoopspay_data:/app/server
    networks:
      - payment_network
    depends_on:
      - juice-shop
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OWASP Juice Shop
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop-app
    ports:
      - "3000:3000"
    environment:
      # Juice Shop configuration
      - NODE_ENV=docker
      - PORT=3000
      # WhoopsPay integration
      - WHOOPSPAY_API_URL=http://whoopspay:5000/api/juice-shop/payment-request
      - WHOOPSPAY_PAYMENT_URL=http://localhost:5000/login?redirect=/dashboard
    volumes:
      - juice_shop_data:/juice-shop/data
      # Mount custom payment integration
      - ./juice-shop-integration:/juice-shop/custom
    networks:
      - payment_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/rest/admin/application-version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy for unified access
  nginx:
    image: nginx:alpine
    container_name: payment-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - payment_network
    depends_on:
      - whoopspay
      - juice-shop
    restart: unless-stopped

volumes:
  whoopspay_data:
    driver: local
  juice_shop_data:
    driver: local

networks:
  payment_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16