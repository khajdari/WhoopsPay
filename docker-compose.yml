# Docker Compose configuration for WhoopsPay + OWASP Juice Shop
# Educational cybersecurity training platform with external payment integration

version: '3.8'

services:
  # WhoopsPay Application
  whoopspay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whoopspay-app
    ports:
      - "3000:5000"  # Map host port 3000 to container port 5000
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:./data/database.db
      - SESSION_SECRET=your-secure-session-secret-change-in-production
      - WHOOPSPAY_URL=http://localhost:3000
      - JUICE_SHOP_URL=http://localhost:3001
    volumes:
      - ./data:/app/data  # Persist SQLite database
      - ./logs:/app/logs  # Persist application logs
    networks:
      - whoopspay-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - juice-shop

  # OWASP Juice Shop (External Payment Service)
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: whoopspay-juice-shop
    ports:
      - "3001:3000"  # Map host port 3001 to container port 3000
    environment:
      - NODE_ENV=production
      - CTF_KEY=zLp@.-6fMW6L-7R3b!9uR_K!4GPL-o5Q_
    networks:
      - whoopspay-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  whoopspay-network:
    driver: bridge
    name: whoopspay-network

volumes:
  whoopspay-data:
    driver: local
  whoopspay-logs:
    driver: local