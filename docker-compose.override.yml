# Docker Compose override for development environment
# This file extends docker-compose.yml for local development

services:
  whoopspay:
    environment:
      - NODE_ENV=production  # Use production build but with development config
      - DEBUG=1
      - WHOOPSPAY_URL=http://localhost:3000
      - JUICE_SHOP_URL=http://localhost:3000/juice-shop
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: npm run start  # Use the production start command
    
  juice-shop:
    environment:
      - NODE_ENV=development