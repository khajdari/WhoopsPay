version: '3.8'

services:
  # WhoopsPay Development
  whoopspay-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: whoopspay-dev
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=file:./server/database.db
      - SESSION_SECRET=dev-session-secret-key
      - JUICE_SHOP_URL=http://juice-shop-dev:3000
      - WHOOPSPAY_URL=http://whoopspay-dev:5000
    volumes:
      - .:/app
      - /app/node_modules
      - whoopspay_dev_data:/app/server
    networks:
      - dev_payment_network
    command: npm run dev
    depends_on:
      - juice-shop-dev

  # OWASP Juice Shop Development
  juice-shop-dev:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WHOOPSPAY_API_URL=http://whoopspay-dev:5000/api/juice-shop/payment-request
      - WHOOPSPAY_PAYMENT_URL=http://localhost:5000/login?redirect=/dashboard
    volumes:
      - juice_shop_dev_data:/juice-shop/data
      - ./juice-shop-integration:/juice-shop/custom
    networks:
      - dev_payment_network

volumes:
  whoopspay_dev_data:
    driver: local
  juice_shop_dev_data:
    driver: local

networks:
  dev_payment_network:
    driver: bridge