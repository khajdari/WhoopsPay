# File: config/default.yml
# Add these configuration options to your existing Juice Shop config

application:
  # Existing configuration...
  
  # PayPwned Integration Configuration
  paypwnedUrl: 'https://paypwned.replit.app'
  paypwnedEnabled: true
  
  # Payment methods configuration
  paymentMethods:
    creditCard:
      enabled: true
    paypwned:
      enabled: true
      name: 'PayPwned'
      description: 'Secure External Payment Platform'
      icon: 'security'
      
# Environment Variables (.env file additions)
# Add these to your .env file:

# PayPwned Integration
PAYPWNED_URL=https://paypwned.replit.app
PAYPWNED_ENABLED=true

# For development
# PAYPWNED_URL=http://localhost:5000

# Production deployment
# PAYPWNED_URL=https://your-paypwned-domain.com