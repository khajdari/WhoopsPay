# File: config/default.yml
# Add these configuration options to your existing Juice Shop config

application:
  # Existing configuration...
  
  # WhoopsPay Integration Configuration
  whoopspayUrl: 'https://whoopspay.replit.app'
  whoopspayEnabled: true
  
  # Payment methods configuration
  paymentMethods:
    creditCard:
      enabled: true
    whoopspay:
      enabled: true
      name: 'WhoopsPay'
      description: 'Secure External Payment Platform'
      icon: 'security'
      
# Environment Variables (.env file additions)
# Add these to your .env file:

# WhoopsPay Integration
WHOOPSPAY_URL=https://whoopspay.replit.app
WHOOPSPAY_ENABLED=true

# For development
# WHOOPSPAY_URL=http://localhost:5000

# Production deployment
# WHOOPSPAY_URL=https://your-whoopspay-domain.com